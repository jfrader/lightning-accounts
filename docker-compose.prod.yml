name: "lightning-accounts-${NODE_ENV:-production}"

include:
  - path: docker-compose.networks.yml

services:
  postgres:
    hostname: postgres_ln_prod
    restart: always
    extends:
      file: docker-compose.base.yml
      service: postgres
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
  server:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NODE_PORT: ${NODE_PORT}
        DATABASE_URL: ${DATABASE_URL:-postgresql://user:pass@localhost:5432/db?schema=public}
        NODE_ORIGIN: ${NODE_ORIGIN:-*}
        JWT_SECRET: ${JWT_SECRET:-build-secret}
        JWT_BASE64_PUBLIC_KEY: ${JWT_BASE64_PUBLIC_KEY:-ZHVtbXktcHVibGljLWtleQ==}
        JWT_BASE64_PRIVATE_KEY: ${JWT_BASE64_PRIVATE_KEY:-ZHVtbXktcHJpdmF0ZS1rZXk=}
        SEED_HASH_SECRET: ${SEED_HASH_SECRET:-build-seed-secret}
    command: ["yarn", "start:prod"]
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    extends:
      file: docker-compose.base.yml
      service: server
    environment:
      APPLICATION_ADDRESS: "::ffff:10.29.0.1"
      DATABASE_URL: "postgresql://${NODE_DB_USER}:${NODE_DB_PASSWORD}@postgres_ln_prod:5432/${NODE_DB_NAME}?schema=public"
