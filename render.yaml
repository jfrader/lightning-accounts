# The shared `trucoshi-postgres` instance and both logical databases are
# created and restored manually before this service.
previews:
  generation: off

services:
  - type: web
    name: lightning-accounts
    runtime: node
    branch: master
    region: virginia
    plan: starter
    numInstances: 1
    buildCommand: npx --yes yarn@1.22.22 install --frozen-lockfile --production=false && npx --yes yarn@1.22.22 build
    preDeployCommand: node build/src/cli/assertDatabaseTarget.js lightning_accounts public lightning_accounts_app && ./node_modules/.bin/prisma migrate deploy && node build/src/cli/provisionApplication.js
    startCommand: node bin/lightning-accounts-server
    # Production follows master only after GitHub CI succeeds. Use a separate
    # branch and Render environment for testnet changes.
    autoDeployTrigger: checksPass
    # Cutover completed on 2026-07-21. Keep the committed state aligned with the
    # live service so a later Blueprint sync cannot re-enable maintenance.
    maintenanceMode:
      enabled: false
    healthCheckPath: /health/ready
    maxShutdownDelaySeconds: 300
    domains:
      - accounts.trucoshi.com
    envVars:
      - key: NODE_VERSION
        value: "24.18.0"
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_ENV
        value: production
      - key: WALLET_ENABLED
        value: "0"
      - key: DATABASE_URL
        # Internal URL for the `lightning_accounts` logical database on the
        # shared instance, using the restricted `lightning_accounts_app` role.
        sync: false
      - key: NODE_ORIGIN
        value: https://trucoshi.com
      - key: NODE_DOMAIN
        value: .trucoshi.com
      - key: NODE_HOST
        value: https://accounts.trucoshi.com
      - key: NODE_TRUST_PROXY_HOPS
        value: "1"
      - key: APPLICATION_EMAILS
        # The audited production migration uses only the newly provisioned
        # game@trucoshi.com identity. Do not carry the legacy source caller into
        # Render without a separate credential review.
        sync: false
      - key: APPLICATION_ADDRESS
        # The source value is tied to its Docker bridge. Render private-service
        # addresses are not stable, so authentication relies on the allowlist
        # and generated service password instead of an obsolete source IP.
        value: ""
      - key: APPLICATION_SERVICE_EMAIL
        value: game@trucoshi.com
      - key: APPLICATION_SERVICE_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        # Preserve the current production value for restored sessions/tokens.
        sync: false
      - key: JWT_COOKIE_PREFIX
        # Live production uses the default empty prefix; preserve it exactly.
        value: ""
      - key: JWT_VERIFY_EMAIL_EXPIRATION_MINUTES
        # Live production uses a nondefault value. Copy it exactly without
        # exposing it in source control or migration logs.
        sync: false
      - key: JWT_BASE64_PUBLIC_KEY
        sync: false
      - key: JWT_BASE64_PRIVATE_KEY
        sync: false
      - key: SEED_HASH_SECRET
        # Preserve the current production value for restored seed-based access.
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TWITTER_CLIENT_TYPE
        sync: false
