services:
  postgres:
    networks:
      lightningaccountsnet:
        ipv4_address: 10.29.0.11
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NODE_DB_USER} -d ${NODE_DB_NAME}"]
      interval: 5s
      start_period: 1s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${NODE_DB_NAME}
      POSTGRES_USER: ${NODE_DB_USER}
      POSTGRES_PASSWORD: ${NODE_DB_PASSWORD}
  server:
    networks:
      lightningaccountsnet:
        ipv4_address: 10.29.0.10
    build:
      context: .
      args:
        NODE_PORT: ${NODE_PORT}
        DATABASE_URL: ${DATABASE_URL:-postgresql://user:pass@localhost:5432/db?schema=public}
        NODE_ORIGIN: ${NODE_ORIGIN:-*}
        JWT_SECRET: ${JWT_SECRET:-build-secret}
        JWT_BASE64_PUBLIC_KEY: ${JWT_BASE64_PUBLIC_KEY:-ZHVtbXktcHVibGljLWtleQ==}
        JWT_BASE64_PRIVATE_KEY: ${JWT_BASE64_PRIVATE_KEY:-ZHVtbXktcHJpdmF0ZS1rZXk=}
        SEED_HASH_SECRET: ${SEED_HASH_SECRET:-build-seed-secret}
    command: ["yarn", "start"]
    expose:
      - "${NODE_PORT}"
    ports:
      - "${NODE_PORT}:${NODE_PORT}"
    env_file:
      - path: ./.env
    extra_hosts:
      - host.docker.internal:host-gateway

networks:
  default: null
  lightningaccountsnet:
    name: lightningaccountsnet
